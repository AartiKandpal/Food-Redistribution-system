<!DOCTYPE html>
<html>
<head>
    <title>Available Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-5">Available Surplus Food</h2>
        <div class="row">
            {% for item in food_list %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title text-success">{{ item.name }}</h5>
                        <p class="card-text"><strong>Quantity:</strong> {{ item.quantity }}</p>
                        <p class="card-text"><strong>Cooked At:</strong> {{ item.cooked_time }}</p>
                        <p class="card-text text-muted small">📍 {{ item.address }}</p>
                        <a href="{{ url_for('claim_food', food_id=item.id) }}" class="btn btn-success w-100">Claim Now</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% if not food_list %}
            <p class="text-center">No food available right now.</p>
        {% endif %}
        <div class="text-center mt-4"><a href="/" class="btn btn-secondary">Back to Home</a></div>
    </div>
    <div class="text-end mb-3">
    <a href="{{ url_for('view_map') }}" class="btn btn-primary shadow-sm">
        <i class="fas fa-map-marked-alt"></i> Switch to Map View
    </a>
</div>
</body>
</html>
